<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Tshirt Experience</title>

  <!-- MindAR + A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* A-Frame canvas must be transparent so the camera feed shows through */
    canvas {
      background: transparent !important;
    }

    /* ── AR Scene ── */
    #ar-scene {
      width: 100%;
      height: 100%;
    }

    /* ── Scanner overlay — shown until marker found ── */
    #scanner-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #scanner-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* dark vignette around edges */
    #scanner-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 35%,
        rgba(0, 0, 0, 0.65) 100%);
      pointer-events: none;
    }

    /* ── Scan frame ── */
    .scan-frame {
      position: relative;
      width: min(68vw, 280px);
      aspect-ratio: 3 / 4;
    }

    /* corner brackets */
    .scan-frame::before,
    .scan-frame::after,
    .scan-frame .corner-br,
    .scan-frame .corner-bl {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #FFD700;
      border-style: solid;
    }

    .scan-frame::before   { top: 0;    left: 0;    border-width: 3px 0 0 3px; }
    .scan-frame::after    { top: 0;    right: 0;   border-width: 3px 3px 0 0; }
    .scan-frame .corner-br{ bottom: 0; right: 0;   border-width: 0 3px 3px 0; }
    .scan-frame .corner-bl{ bottom: 0; left: 0;    border-width: 0 0 3px 3px; }

    /* moving scan line */
    .scan-line {
      position: absolute;
      left: 4px;
      right: 4px;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255, 215, 0, 0.15) 15%,
        rgba(255, 215, 0, 0.9) 50%,
        rgba(255, 215, 0, 0.15) 85%,
        transparent 100%);
      box-shadow: 0 0 12px 3px rgba(255, 215, 0, 0.5);
      animation: scan-move 2s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    }

    @keyframes scan-move {
      0%   { top: 4px;   opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { top: calc(100% - 6px); opacity: 0; }
    }

    /* subtle grid inside frame */
    .scan-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,215,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,215,0,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* pulsing ring around frame */
    .scan-pulse {
      position: absolute;
      inset: -14px;
      border: 1.5px solid rgba(255, 215, 0, 0.18);
      border-radius: 4px;
      animation: pulse-ring 2s ease-out infinite;
    }

    @keyframes pulse-ring {
      0%   { transform: scale(1);    opacity: 0.5; }
      70%  { transform: scale(1.06); opacity: 0; }
      100% { transform: scale(1.06); opacity: 0; }
    }

    /* ── Status text ── */
    .scan-label {
      margin-top: 28px;
      color: #FFD700;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(255,215,0,0.6);
      animation: text-blink 1.8s ease-in-out infinite;
    }

    @keyframes text-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }

    .scan-sub {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.45);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-align: center;
    }

    /* ── Found flash ── */
    #found-flash {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(255, 215, 0, 0.18);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    #found-flash.flash {
      animation: flash-anim 0.5s ease forwards;
    }

    @keyframes flash-anim {
      0%   { opacity: 0.6; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Scanner UI (shown until marker detected) -->
  <div id="scanner-overlay">
    <div class="scan-frame">
      <div class="scan-grid"></div>
      <div class="scan-pulse"></div>
      <div class="scan-line"></div>
      <span class="corner-br"></span>
      <span class="corner-bl"></span>
    </div>
    <p class="scan-label">Наведи камеру</p>
    <p class="scan-sub">Направ на зображення на футболці</p>
  </div>

  <!-- Flash on detection -->
  <div id="found-flash"></div>

  <!-- AR Scene -->
  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: assets/targets.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.001; filterBeta: 0.01"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="marker-model" src="assets/marker.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Natural lighting rig -->
    <!-- Key light: warm sun from upper-right front -->
    <a-light type="directional" color="#fff5e0" intensity="1.6"
             position="1 2 1.5" castShadow="false"></a-light>
    <!-- Fill light: cool sky from left -->
    <a-light type="directional" color="#c9dff5" intensity="0.7"
             position="-2 1 0.5"></a-light>
    <!-- Bounce light: warm ground reflection from below -->
    <a-light type="directional" color="#ffe8b0" intensity="0.4"
             position="0 -1.5 1"></a-light>
    <!-- Ambient: soft base so shadows aren't pure black -->
    <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>

    <!-- Anchor tied to image target #0 -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        id="ar-model"
        src="#marker-model"
        position="0 0 0"
        scale="10 10 10"
        anim-autoplay
      ></a-gltf-model>
    </a-entity>

  </a-scene>

  <script>
    const overlay    = document.getElementById('scanner-overlay');
    const flash      = document.getElementById('found-flash');
    const scene      = document.getElementById('ar-scene');

    let markerVisible = false;

    // Auto-play and loop all animations embedded in the GLB
    AFRAME.registerComponent('anim-autoplay', {
      init() {
        this.el.addEventListener('model-loaded', () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh) return;

          const model = this.el.components['gltf-model'].model;
          if (!model || !model.animations || !model.animations.length) return;

          // THREE.AnimationMixer — plays every clip inside the GLB on loop
          const mixer = new THREE.AnimationMixer(model.scene);
          model.animations.forEach(clip => {
            const action = mixer.clipAction(clip);
            action.setLoop(THREE.LoopRepeat, Infinity);
            action.play();
          });

          // tick the mixer every frame
          this.mixer = mixer;
          this.lastTime = null;
        });
      },

      tick(time) {
        if (!this.mixer) return;
        if (this.lastTime === null) { this.lastTime = time; return; }
        const delta = (time - this.lastTime) / 1000;
        this.mixer.update(delta);
        this.lastTime = time;
      }
    });

    scene.addEventListener('loaded', () => {
      const target = document.querySelector('[mindar-image-target]');

      target.addEventListener('targetFound', () => {
        if (markerVisible) return;
        markerVisible = true;

        overlay.classList.add('hidden');

        flash.classList.add('flash');
        flash.addEventListener('animationend', () => flash.classList.remove('flash'), { once: true });
      });

      target.addEventListener('targetLost', () => {
        markerVisible = false;
        overlay.classList.remove('hidden');
      });
    });
  </script>

</body>
</html>
